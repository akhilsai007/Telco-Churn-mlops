artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_path: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  ingested_data_path: artifacts/data_ingestion/data.csv

data_validation:
  root_dir: artifacts/data_validation
  report_path: artifacts/data_validation/validation_report.json
  status_path: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  preprocessor_path: artifacts/data_transformation/preprocessor.joblib
  train_path: artifacts/data_transformation/train.csv
  test_path: artifacts/data_transformation/test.csv
  test_size: 0.2
  random_state: 42
  drop_columns: ["customerID"]

model_trainer:
  root_dir: artifacts/model_trainer
  model_path: artifacts/model_trainer/model.joblib
  metrics_path: artifacts/model_trainer/metrics.json
  experiment_name: telco-churn
  random_state: 42

schema:
  target_column: Churn
  expected_rows: 7043
  columns:
    customerID: object
    gender: object
    SeniorCitizen: int64
    Partner: object
    Dependents: object
    tenure: int64
    PhoneService: object
    MultipleLines: object
    InternetService: object
    OnlineSecurity: object
    OnlineBackup: object
    DeviceProtection: object
    TechSupport: object
    StreamingTV: object
    StreamingMovies: object
    Contract: object
    PaperlessBilling: object
    PaymentMethod: object
    MonthlyCharges: float64
    TotalCharges: object
    Churn: object
  categorical_values:
    gender: ["Female", "Male"]
    Partner: ["Yes", "No"]
    Dependents: ["Yes", "No"]
    PhoneService: ["Yes", "No"]
    MultipleLines: ["Yes", "No", "No phone service"]
    InternetService: ["DSL", "Fiber optic", "No"]
    OnlineSecurity: ["Yes", "No", "No internet service"]
    OnlineBackup: ["Yes", "No", "No internet service"]
    DeviceProtection: ["Yes", "No", "No internet service"]
    TechSupport: ["Yes", "No", "No internet service"]
    StreamingTV: ["Yes", "No", "No internet service"]
    StreamingMovies: ["Yes", "No", "No internet service"]
    Contract: ["Month-to-month", "One year", "Two year"]
    PaperlessBilling: ["Yes", "No"]
    PaymentMethod:
      - "Electronic check"
      - "Mailed check"
      - "Bank transfer (automatic)"
      - "Credit card (automatic)"
    Churn: ["Yes", "No"]
